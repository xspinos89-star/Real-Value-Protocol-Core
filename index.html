<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Professional Edition v13.6</title>
    
    <script src="https://c0f4f41c-2f55-4823-95d3-973646508024.js.cdn.sdk.metamask.io/metamask-sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --card: #0f172a;
            --primary: #10b981;
            --secondary: #3b82f6;
            --danger: #ef4444;
            --text: #f8fafc;
            --accent: #f59e0b;
            --border: #1e293b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .dashboard {
            width: 100%;
            max-width: 550px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-2px); border-color: var(--secondary); }

        .label {
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .label::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            margin-right: 8px;
        }

        .value {
            font-size: 2rem;
            font-weight: 800;
            margin: 10px 0;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            word-break: break-all;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .mini-card {
            background: rgba(30, 41, 59, 0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 14px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-deposit { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-harvest { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-main:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-main:active { transform: scale(0.98); }

        #connectBtn {
            padding: 12px 24px;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        #connectBtn.active { background: var(--primary); color: white; border: none; }

        .footer-note {
            text-align: center;
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 30px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="logo">RVP <span>PROTOCOL</span></div>
        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <div id="mainUI" style="display:none;">
        <div class="card">
            <div class="label">Safe Capital (Global Asset)</div>
            <div id="safeCap" class="value">0.0000 ETH</div>
            <div style="font-size: 0.8rem; color: var(--primary);">Verified On Arbitrum Blockchain</div>
        </div>

        <div class="card" style="border-top: 4px solid var(--accent);">
            <div class="label" style="color: var(--accent);">Captured Market Air</div>
            <div id="airVal" class="value" style="color: var(--accent)">0.00000000</div>
            <div style="font-size: 0.8rem;">Debt Leakage Extraction Active</div>
        </div>

        <div class="stats-grid">
            <div class="mini-card">
                <div class="label">RWA Units</div>
                <div id="rwaVal" style="font-weight: 800; color: var(--primary); font-size: 1.2rem;">0.0000</div>
            </div>
            <div class="mini-card">
                <div class="label">Debt Cancelled</div>
                <div id="debtVal" style="font-weight: 800; color: var(--danger); font-size: 1.2rem;">0.0000</div>
            </div>
        </div>

        <button class="btn-main btn-deposit" onclick="deposit()">
            Deposit to Vault
        </button>
        <button class="btn-main btn-harvest" onclick="harvest()">
            Solidify & Harvest RWA
        </button>
        
        <div class="footer-note">
            Universal Sync v13.6 | No Local Data | Pure Blockchain Source
        </div>
    </div>
</div>

<script>
    const CONTRACT_ADDRESS = "0x99e09C98f0548Aba8803221157e653B82e345980";
    const ABI = [
        {"inputs":[],"name":"deposit","outputs":[],"stateMutability":"payable","type":"function"},
        {"inputs":[],"name":"airHarvest","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[{"internalType":"uint256","name":"deposit","type":"uint256"},{"internalType":"uint256","name":"physicalInfra","type":"uint256"},{"internalType":"uint256","name":"lastUpdate","type":"uint256"},{"internalType":"uint256","name":"accumulatedAir","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    let provider, signer, contract;
    const mmsdk = new MetaMaskSDK.MetaMaskSDK({ dappMetadata: { name: "RVP Protocol", url: window.location.href } });

    async function connectWallet() {
        try {
            const client = mmsdk.getProvider();
            provider = new ethers.BrowserProvider(client);
            const accounts = await client.request({ method: 'eth_requestAccounts' });
            signer = await provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

            const btn = document.getElementById('connectBtn');
            btn.innerText = "Active: " + accounts[0].substring(0,6) + "...";
            btn.classList.add('active');
            document.getElementById('mainUI').style.display = "block";
            
            // Ξεκινάει ο παγκόσμιος συγχρονισμός
            setInterval(updateGlobalUI, 1000);
        } catch (err) { console.error(err); }
    }

    async function updateGlobalUI() {
        try {
            const addr = await signer.getAddress();
            const userData = await contract.users(addr);
            
            const dep = parseFloat(ethers.formatEther(userData.deposit));
            const rwa = parseFloat(ethers.formatEther(userData.physicalInfra));
            const lastUpdate = Number(userData.lastUpdate);
            const onChainAccumulatedAir = parseFloat(ethers.formatEther(userData.accumulatedAir));

            // Υπολογισμός με βάση το Blockchain Clock (Το "0.10" + Πληθωρισμός)
            const now = Math.floor(Date.now() / 1000);
            const timePassed = now - lastUpdate;
            const marketInfRate = 0.0434; // 4.34%
            
            let liveAir = 0;
            if (dep > 0) {
                const flatDebt = dep * 0.10; 
                const temporalAir = (dep * marketInfRate * timePassed) / 31536000;
                liveAir = flatDebt + onChainAccumulatedAir + temporalAir;
            }

            document.getElementById('safeCap').innerText = dep.toFixed(4) + " ETH";
            document.getElementById('airVal').innerText = liveAir.toFixed(8) + " ETH";
            document.getElementById('rwaVal').innerText = rwa.toFixed(4) + " Units";
            // Το Debt Cancelled είναι η υποδομή που χτίστηκε συν τον αέρα που έχει ήδη στερεοποιηθεί
            document.getElementById('debtVal').innerText = (rwa * 1.1).toFixed(4) + " ETH";

        } catch (e) { console.error("Global Sync Error", e); }
    }

    async function deposit() {
        const amount = prompt("Ποσό κατάθεσης (ETH):");
        if(!amount) return;
        try {
            const tx = await contract.deposit({ value: ethers.parseEther(amount) });
            await tx.wait();
        } catch (e) { alert("Η κατάθεση ακυρώθηκε."); }
    }

    async function harvest() {
        try {
            const tx = await contract.airHarvest();
            await tx.wait();
            alert("Solidification Επιτυχές!");
        } catch (e) { alert("Σφάλμα κατά το Harvest."); }
    }
</script>
</body>
</html>
