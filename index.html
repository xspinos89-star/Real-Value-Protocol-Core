<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Industrial v10.2 Restored</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --panel: #05080a; --primary: #00f2ff; --secondary: #1a2a3a; --danger: #ff003c; --text: #e0e0e0; --border: #00f2ff; }
        
        body { 
            background: var(--bg); 
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; padding: 20px; 
        }

        .dashboard { 
            max-width: 1200px; margin: 0 auto; 
            border: 1px solid rgba(0, 242, 255, 0.2); 
            background: var(--panel); 
            padding: 30px;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
        }
        
        header { 
            border-bottom: 3px double var(--border); 
            padding-bottom: 20px; margin-bottom: 40px; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); text-shadow: 0 0 10px var(--primary); letter-spacing: 4px; }

        .main-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        
        .stat-card { 
            border: 1px solid #1a2a3a; background: rgba(0,0,0,0.8); padding: 20px; 
            clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
            transition: 0.3s;
        }

        .stat-card:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .label { font-size: 0.7rem; color: #555; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; }
        .value { font-size: 1.4rem; font-weight: 700; color: #fff; font-family: 'Orbitron'; }

        .efficiency-section { 
            margin: 30px 0; padding: 20px; border: 1px solid #1a2a3a; 
            background: linear-gradient(180deg, rgba(0,0,0,1) 0%, rgba(10,15,20,1) 100%);
        }

        .bar-container { width: 100%; height: 10px; background: #111; border: 1px solid #222; margin-top: 15px; }
        #efficiencyBar { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }
        
        .btn { 
            padding: 25px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; border: 1px solid var(--primary); transition: 0.3s; 
            background: transparent; color: var(--primary);
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
        }

        .btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        .btn-sol { border-color: #fff; color: #fff; }
        .btn-sol:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }

        #userAddr { font-size: 0.75rem; color: var(--primary); font-family: 'JetBrains Mono'; }
        
        .oracle-box { border-left: 4px solid var(--danger); padding-left: 15px; background: rgba(255,0,60,0.05); }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div>
            <h1>RVP PROTOCOL v10.2 <span style="font-size: 0.8rem; color: #333;">(BUILD_14.3)</span></h1>
            <div id="userAddr">SYSTEM_OFFLINE // CONNECT_TO_NODE</div>
        </div>
        <button onclick="connectWallet()" id="connBtn" style="border: 1px solid var(--primary); background:none; color:var(--primary); padding:10px 20px; cursor:pointer; font-family:'Orbitron';">LINK_ACCOUNT</button>
    </header>

    <div class="main-stats">
        <div class="stat-card">
            <div class="label">Safe Capital</div>
            <div id="safeCap" class="value">0.0000</div>
        </div>
        <div class="stat-card">
            <div class="label">Sovereign VP</div>
            <div id="vpVal" class="value">0.0000</div>
        </div>
        <div class="stat-card" style="border-color: var(--danger);">
            <div class="label">Environmental Air</div>
            <div id="airVal" class="value" style="color:var(--danger);">0.000000</div>
        </div>
        <div class="stat-card">
            <div class="label">RWA Infra</div>
            <div id="rwaVal" class="value">0.0000</div>
        </div>
    </div>

    <div class="efficiency-section">
        <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.8rem;">
            <span>SOLIDIFICATION_EFFICIENCY</span>
            <span id="efficiencyText">100%</span>
        </div>
        <div class="bar-container"><div id="efficiencyBar"></div></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="oracle-box">
            <div class="label">Oracle Inflation Index</div>
            <div id="oracleIndex" style="font-size:1.5rem; font-weight:700;">0.00%</div>
        </div>
        <div class="stat-card" style="border-color: #fff;">
            <div class="label">Debt Shield Status</div>
            <div id="debtStatus" style="font-size:1rem; color:#fff;">UNLOCKED</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn" onclick="deposit()">Deposit Capital</button>
        <button class="btn btn-sol" onclick="harvest()">Solidify Air</button>
    </div>
</div>

<script>
    let marketInf = 0.04;
    const CONTRACT_ADDRESS = "0x99e09C98f0548Aba8803221157e653B82e345980";
    const ABI = [
        {"inputs":[],"name":"deposit","outputs":[],"stateMutability":"payable","type":"function"},
        {"inputs":[],"name":"airHarvest","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"address","name":"_user","type":"address"}],"name":"getVotingPower","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[{"internalType":"uint256","name":"deposit","type":"uint256"},{"internalType":"uint256","name":"physicalInfra","type":"uint256"},{"internalType":"uint256","name":"lastUpdate","type":"uint256"},{"internalType":"uint256","name":"accumulatedAir","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    let provider, signer, contract, currentArchitect;

    async function connectWallet() {
        if (!window.ethereum) return alert("MetaMask not found");
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        currentArchitect = accounts[0];
        document.getElementById('userAddr').innerText = "ARCHITECT_ACTIVE // " + currentArchitect;
        document.getElementById('connBtn').style.display = "none";
        
        await syncData();
        setInterval(syncData, 1000);
    }

    async function syncData() {
        if (!currentArchitect) return;
        try {
            signer = await provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            
            const u = await contract.users(currentArchitect);
            const vpBase = await contract.getVotingPower(currentArchitect);
            
            const safeCap = parseFloat(ethers.formatEther(u.deposit));
            const rwa = parseFloat(ethers.formatEther(u.physicalInfra));
            const airOnChain = parseFloat(ethers.formatEther(u.accumulatedAir));
            const lastUpd = Number(u.lastUpdate);
            const now = Math.floor(Date.now() / 1000);
            const timeDiff = now - lastUpd;

            // Environmental Air Logic
            let baseFlux = 0.00015;
            let resistance = 1 / (1 + (rwa * 2.5));
            let envGrowth = (baseFlux * marketInf * timeDiff * 100) / 31536000;
            let totalAir = airOnChain + (envGrowth * resistance);

            // UI Update
            document.getElementById('safeCap').innerText = safeCap.toFixed(4);
            document.getElementById('airVal').innerText = totalAir.toFixed(8);
            document.getElementById('rwaVal').innerText = rwa.toFixed(4);
            
            let threshold = safeCap > 0 ? safeCap * 0.10 : 0.01;
            let saturation = (totalAir / threshold) * 100;
            let efficiency = Math.max(0, 100 - (saturation > 100 ? (saturation - 100) : 0));
            
            document.getElementById('efficiencyBar').style.width = Math.min(saturation, 100) + "%";
            document.getElementById('efficiencyText').innerText = Math.round(efficiency) + "%";
            document.getElementById('vpVal').innerText = (parseFloat(ethers.formatEther(vpBase)) * (efficiency/100)).toFixed(6);

            document.getElementById('debtStatus').innerText = airOnChain > 0.000001 ? "SOLIDIFYING..." : "PROTECTED";
        } catch(e) { console.log(e); }
    }

    async function deposit() {
        try {
            // Re-instantiate signer for every call to ensure MetaMask is active
            const tempProvider = new ethers.BrowserProvider(window.ethereum);
            const tempSigner = await tempProvider.getSigner();
            const tempContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, tempSigner);
            
            const amt = prompt("Amount of ETH for Safe Capital:");
            if (!amt) return;
            
            const tx = await tempContract.deposit({ value: ethers.parseEther(amt) });
            await tx.wait();
        } catch(e) { alert("Deposit Error: " + e.message); }
    }

    async function harvest() {
        try {
            const tempProvider = new ethers.BrowserProvider(window.ethereum);
            const tempSigner = await tempProvider.getSigner();
            const tempContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, tempSigner);
            
            const tx = await tempContract.airHarvest();
            await tx.wait();
        } catch(e) { alert("Harvest Error: " + e.message); }
    }
</script>
</body>
</html>
