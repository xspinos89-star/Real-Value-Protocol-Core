<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Master Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #05070a; --card: #0f172a; --primary: #10b981; --secondary: #3b82f6; --text: #f8fafc; --accent: #f59e0b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .dashboard { width: 100%; max-width: 1000px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #1e293b; }
        .label { color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; }
        .value { font-size: 1.5rem; font-weight: bold; margin-top: 5px; font-family: monospace; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-dep { background: var(--secondary); color: white; }
        .btn-harv { background: var(--primary); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .status { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-top: 15px; text-align: center; border: 1px dashed #334155; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2 style="margin:0;">RVP Protocol <span style="color:var(--primary)">v10.6</span></h2>
    <div id="walletAddr" style="font-size: 0.7rem; color: var(--secondary); margin-bottom: 20px;">Παρακαλώ συνδέστε το Πορτοφόλι σας</div>
    
    <button id="connBtn" class="btn btn-dep" onclick="connect()">ΣΥΝΔΕΣΗ METAMASK</button>

    <div id="mainUI" style="display:none;">
        <div class="grid">
            <div class="card"><div class="label">Safe Capital</div><div id="safeCap" class="value">0.0000 ETH</div></div>
            <div class="card"><div class="label">Captured Air</div><div id="airVal" class="value" style="color:var(--accent)">0.00000000 ETH</div></div>
            <div class="card"><div class="label">Solidified Assets</div><div id="rwaVal" class="value" style="color:var(--primary)">0.0000</div></div>
            <div class="card"><div class="label">Loyalty Factor</div><div id="loyalty" class="value">x1.0000</div></div>
        </div>

        <div class="status" id="statusBox">ΣΥΣΤΗΜΑ ΕΤΟΙΜΟ</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
            <button class="btn btn-dep" onclick="deposit()">ΚΑΤΑΘΕΣΗ ETH</button>
            <button class="btn btn-harv" onclick="harvest()">HARVEST RWA</button>
        </div>
    </div>
</div>

<script>
    const CONTRACT_ADDRESS = "0x99e09C98f0548Aba8803221157e653B82e345980";
    const ABI = [
        {"inputs":[],"name":"airHarvest","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"address","name":"_user","type":"address"}],"name":"getVotingPower","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[{"internalType":"uint256","name":"deposit","type":"uint256"},{"internalType":"uint256","name":"physicalInfra","type":"uint256"},{"internalType":"uint256","name":"lastUpdate","type":"uint256"},{"internalType":"uint256","name":"accumulatedAir","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    let provider, signer, contract;

    async function connect() {
        if (!window.ethereum) return alert("MetaMask required!");
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        
        document.getElementById('connBtn').style.display = "none";
        document.getElementById('mainUI').style.display = "block";
        const addr = await signer.getAddress();
        document.getElementById('walletAddr').innerText = "ARCHITECT: " + addr;
        
        updateData(addr);
        setInterval(() => updateData(addr), 3000);
    }

    async function deposit() {
        try {
            const val = prompt("Ποσό σε ETH:", "0.05");
            if (!val) return;

            document.getElementById('statusBox').innerText = "ΑΠΟΣΤΟΛΗ ΣΤΟ BLOCKCHAIN...";
            
            // Η πιο σταθερή μέθοδος αποστολής για να μην κάνει revert
            const tx = await signer.sendTransaction({
                to: CONTRACT_ADDRESS,
                value: ethers.parseEther(val),
                gasLimit: 250000 // Πολύ πάνω από το όριο για σιγουριά
            });

            await tx.wait();
            alert("ΕΠΙΤΥΧΙΑ!");
        } catch (e) {
            console.error(e);
            alert("Σφάλμα: Η συναλλαγή απορρίφθηκε. Δοκιμάστε μικρότερο ποσό ή ελέγξτε το Remix.");
        }
    }

    async function updateData(addr) {
        try {
            const data = await contract.users(addr);
            const vp = await contract.getVotingPower(addr);
            
            const dep = parseFloat(ethers.formatEther(data.deposit));
            const now = Math.floor(Date.now() / 1000);
            const diff = now - Number(data.lastUpdate);
            
            let air = (dep * 0.172 / 31536000 * diff) + parseFloat(ethers.formatEther(data.accumulatedAir));
            let loyalty = 1 + (diff * 0.0000001);

            document.getElementById('safeCap').innerText = dep.toFixed(4) + " ETH";
            document.getElementById('airVal').innerText = air.toFixed(8) + " ETH";
            document.getElementById('rwaVal').innerText = parseFloat(ethers.formatEther(data.physicalInfra)).toFixed(4);
            document.getElementById('loyalty').innerText = "x" + loyalty.toFixed(6);
            document.getElementById('statusBox').innerText = "ORACLE SYNCED | MARKET INFLATION: 7.20%";
        } catch (e) { console.log(e); }
    }

    async function harvest() {
        try {
            const tx = await contract.airHarvest({ gasLimit: 300000 });
            await tx.wait();
            alert("Harvest Success!");
        } catch (e) { alert("Harvest failed."); }
    }
</script>
</body>
</html>
