<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Alpha Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #58a6ff; --success: #3fb950; --danger: #f85149; --bg: #05070a; --card: #0d1117; }
        body { background: var(--bg); color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .container { background: var(--card); border: 1px solid #30363d; border-radius: 28px; padding: 35px; display: inline-block; width: 90%; max-width: 450px; box-shadow: 0 25px 60px rgba(0,0,0,0.7); margin-top: 30px; }
        .stat-card { background: rgba(255,255,255,0.02); border: 1px solid #30363d; padding: 18px; border-radius: 16px; margin: 12px 0; text-align: left; }
        .label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .value { color: #fff; font-size: 20px; font-weight: 700; margin-top: 6px; font-family: 'Courier New', monospace; }
        .progress-bg { background: #21262d; height: 8px; border-radius: 4px; margin-top: 10px; }
        .progress-fill { background: linear-gradient(90deg, var(--success), var(--primary)); height: 100%; width: 0%; border-radius: 4px; transition: width 1s ease; }
        button { background: #238636; color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        button:hover { background: #2ea043; transform: scale(1.02); }
        .air-value { color: #ff6b6b !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="color: var(--primary); margin-bottom: 5px;">RVP Protocol</h1>
        <p style="font-size: 13px; color: #8b949e; margin-bottom: 25px;">Infrastructure Inversion v1.0</p>

        <div id="auth">
            <button onclick="init()">Connect Protocol Terminal</button>
        </div>

        <div id="dashboard" style="display:none">
            <div class="stat-card">
                <div class="label">Live Voting Power</div>
                <div id="vp" class="value">0.0000</div>
            </div>

            <div class="stat-card">
                <div class="label">Physical Infrastructure (RWA)</div>
                <div id="rwa" class="value" style="color: var(--success);">0.0000 RWA</div>
                <div class="progress-bg"><div id="rwaBar" class="progress-fill"></div></div>
            </div>

            <div class="stat-card">
                <div class="label">Total Infra Air (Debt)</div>
                <div id="air" class="value air-value">0.0000 RVT</div>
            </div>

            <button onclick="harvest()">🚀 Execute Air Harvest</button>
            <p id="status" style="font-size: 11px; color: #8b949e; margin-top: 20px;">● System Active</p>
        </div>
    </div>

    <script>
        // Η ΔΙΚΗ ΣΟΥ ΣΩΣΤΗ ΔΙΕΥΘΥΝΣΗ
        const CONTRACT_ADDR = "0x3020230F8D1C5EA188f00Ef9b0fCBA1A424c4F80";
        
        const ABI = [
            "function getVotingPower(address) view returns (uint256)",
            "function physicalInfrastructure() view returns (uint256)",
            "function totalInfraAir() view returns (uint256)",
            "function airHarvest() public"
        ];

        let signer, contract;

        async function init() {
            if (!window.ethereum) return alert("Install MetaMask");
            const provider = new ethers.BrowserProvider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);
            
            document.getElementById('auth').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            update();
            setInterval(update, 5000);
        }

        async function update() {
            try {
                const user = await signer.getAddress();
                const [vpRaw, rwaRaw, airRaw] = await Promise.all([
                    contract.getVotingPower(user),
                    contract.physicalInfrastructure(),
                    contract.totalInfraAir()
                ]);

                document.getElementById('vp').innerText = parseFloat(ethers.formatUnits(vpRaw, 18)).toFixed(4);
                document.getElementById('rwa').innerText = parseFloat(ethers.formatUnits(rwaRaw, 18)).toFixed(6) + " RWA";
                document.getElementById('air').innerText = parseFloat(ethers.formatUnits(airRaw, 18)).toFixed(6) + " RVT";

                let progress = (parseFloat(ethers.formatUnits(rwaRaw, 18)) / 0.1) * 100;
                document.getElementById('rwaBar').style.width = Math.min(progress, 100) + "%";
                
                document.getElementById('status').innerText = "● Live on Sepolia";
            } catch (e) { 
                console.error(e);
                document.getElementById('status').innerText = "⚠️ Contract Error: Check Address";
            }
        }

        async function harvest() {
            try {
                const tx = await contract.airHarvest();
                document.getElementById('status').innerText = "⌛ Confirming...";
                await tx.wait();
                update();
                document.getElementById('status').innerText = "✅ Success";
            } catch (e) { alert("Tx Failed"); }
        }
    </script>
</body>
</html>
