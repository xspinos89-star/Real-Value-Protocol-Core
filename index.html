<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Professional Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #05070a; color: #e6edf3; text-align: center; padding: 20px; }
        .container { background: linear-gradient(145deg, #0d1117, #161b22); border-radius: 24px; padding: 40px; display: inline-block; border: 1px solid #30363d; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-width: 450px; width: 100%; margin-top: 50px; }
        h1 { color: #58a6ff; font-size: 28px; margin-bottom: 10px; letter-spacing: -1px; }
        .status-dot { height: 10px; width: 10px; background-color: #3fb950; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .stat-box { margin: 20px 0; padding: 20px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); text-align: left; transition: 0.3s; }
        .stat-box:hover { border-color: #58a6ff; background: rgba(88, 166, 255, 0.05); }
        .label { color: #8b949e; font-size: 11px; text-transform: uppercase; font-weight: 600; }
        .value { font-size: 24px; font-weight: 700; color: #ffffff; margin-top: 8px; }
        .progress-container { background: #21262d; border-radius: 20px; height: 12px; margin-top: 15px; overflow: hidden; border: 1px solid #30363d; }
        .progress-bar { background: linear-gradient(90deg, #3fb950, #58a6ff); height: 100%; width: 0%; transition: width 2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .btn-main { background: #238636; color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 15px rgba(35, 134, 54, 0.3); }
        .btn-main:hover { background: #2ea043; transform: translateY(-2px); }
        .btn-harvest { background: transparent; border: 1px solid #58a6ff; color: #58a6ff; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn-harvest:hover { background: rgba(88, 166, 255, 0.1); }
    </style>
</head>
<body>

    <div class="container">
        <h1>RVP Protocol</h1>
        <div id="connectionStatus" style="color: #8b949e; font-size: 13px; margin-bottom: 30px;">
            <span class="status-dot" style="background-color: #f85149;"></span> Disconnected
        </div>
        
        <div id="connectSection">
            <button class="btn-main" onclick="connectWallet()">Connect MetaMask</button>
        </div>

        <div id="dashboardSection" style="display:none;">
            <div class="stat-box">
                <div class="label">Total Voting Power</div>
                <div id="votingPower" class="value">0.00</div>
            </div>
            
            <div class="stat-box">
                <div class="label">Infrastructure Real Assets (RWA)</div>
                <div id="physicalInfra" class="value" style="color: #3fb950;">0.00 Units</div>
                <div class="progress-container">
                    <div id="bar" class="progress-bar"></div>
                </div>
            </div>

            <button class="btn-harvest" onclick="harvestAir()">🚀 Harvest Air to Infrastructure</button>
        </div>
    </div>

    <script>
        // ΒΑΛΕ ΤΗ ΔΙΕΥΘΥΝΣΗ ΣΟΥ ΕΔΩ:
        const contractAddress = "0x30372f69466547690623631525a4773a9856a93d"; 
        
        const abi = [
            "function getVotingPower(address _user) view returns (uint256)",
            "function physicalInfrastructure() view returns (uint256)",
            "function airHarvest() public",
            "function totalInfraAir() view returns (uint256)"
        ];

        let provider, signer, contract;

        async function connectWallet() {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                const address = await signer.getAddress();
                
                document.getElementById("connectionStatus").innerHTML = `<span class="status-dot"></span> Connected: ${address.substring(0,6)}...${address.substring(38)}`;
                document.getElementById("connectSection").style.display = "none";
                document.getElementById("dashboardSection").style.display = "block";
                
                contract = new ethers.Contract(contractAddress, abi, signer);
                refreshData(address);
                setInterval(() => refreshData(address), 5000);
            }
        }

        async function refreshData(address) {
            try {
                const vpRaw = await contract.getVotingPower(address);
                const physRaw = await contract.physicalInfrastructure();
                
                // Μορφοποίηση νούμερων (από Wei σε Ether)
                const vp = parseFloat(ethers.formatUnits(vpRaw, 18)).toFixed(2);
                const phys = parseFloat(ethers.formatUnits(physRaw, 18)).toFixed(4);

                document.getElementById("votingPower").innerText = vp;
                document.getElementById("physicalInfra").innerText = phys + " RWA Units";

                // Πρόοδος μπάρας (Στόχος τα 0.1 RWA για αρχή)
                let progress = (phys / 0.1) * 100;
                document.getElementById("bar").style.width = Math.min(progress, 100) + "%";
            } catch (e) { console.log(e); }
        }

        async function harvestAir() {
            try {
                const tx = await contract.airHarvest();
                alert("Harvesting in progress... Wait for blockchain confirmation!");
                await tx.wait();
                alert("Success! Your Infrastructure has increased!");
            } catch (e) { alert("Error: " + e.reason); }
        }
    </script>
</body>
</html>
