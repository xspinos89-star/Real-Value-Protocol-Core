<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>RVP Protocol v3.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 50px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 15px; display: inline-block; }
        .btn { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .btn:hover { background: #2ea043; }
        #status { margin: 20px; color: #8b949e; }
        .dashboard { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>RVP CONTROL PANEL</h1>
    <div id="status">Αναμονή για MetaMask...</div>
    
    <button id="connectBtn" class="btn" onclick="connectWallet()">ΣΥΝΔΕΣΗ METAMASK</button>

    <div id="dashboard" class="dashboard">
        <p>Wallet: <span id="userAddr" style="color:#58a6ff"></span></p>
        <hr>
        <button class="btn" onclick="sendDeposit()" style="background:#1f6feb">ΚΑΤΑΘΕΣΗ 0.1 ETH</button>
    </div>
</div>

<script>
    const CONTRACT_ADDRESS = "0xF5796E92b7722749444B6002fD4A47C10B000000";
    const ABI = ["function deposit() public payable"];

    let signer, contract;

    async function connectWallet() {
        console.log("Το κουμπί πατήθηκε!");
        
        if (typeof window.ethereum === 'undefined') {
            alert("Το MetaMask δεν βρέθηκε! Εγκατέστησέ το.");
            return;
        }

        try {
            // 1. Ζητάμε λογαριασμούς
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const account = accounts[0];
            
            // 2. Αρχικοποιούμε τον Provider με ethers
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

            // 3. Ενημερώνουμε το UI
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userAddr').innerText = account;
            document.getElementById('status').innerText = "ΣΥΝΔΕΘΗΚΕ!";
            
            console.log("Σύνδεση επιτυχής με:", account);
        } catch (error) {
            console.error("Σφάλμα:", error);
            alert("Η σύνδεση απέτυχε: " + error.message);
        }
    }

    async function sendDeposit() {
        try {
            document.getElementById('status').innerText = "Περίμενε το MetaMask...";
            const tx = await contract.deposit({ 
                value: ethers.utils.parseEther("0.1") 
            });
            document.getElementById('status').innerText = "Η συναλλαγή στάλθηκε! Αναμονή...";
            await tx.wait();
            document.getElementById('status').innerText = "Η ΚΑΤΑΘΕΣΗ ΟΛΟΚΛΗΡΩΘΗΚΕ!";
            alert("Επιτυχία!");
        } catch (error) {
            console.error(error);
            alert("Αποτυχία κατάθεσης.");
            document.getElementById('status').innerText = "Σφάλμα συναλλαγής.";
        }
    }
</script>

</body>
</html>
