<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Live Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; text-align: center; padding: 40px; }
        .container { background: #161b22; border-radius: 20px; padding: 30px; display: inline-block; border: 1px solid #30363d; box-shadow: 0 15px 35px rgba(0,0,0,0.6); max-width: 500px; width: 100%; }
        h1 { color: #58a6ff; font-size: 24px; margin-bottom: 5px; }
        .status { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        .stat-box { margin: 15px 0; padding: 20px; border-radius: 12px; background: #21262d; border: 1px solid #30363d; text-align: left; }
        .label { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 20px; font-weight: bold; color: #3fb950; margin-top: 5px; }
        .progress-container { background: #30363d; border-radius: 10px; height: 10px; margin-top: 15px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #3fb950, #58a6ff); height: 100%; width: 0%; transition: width 1.5s ease-in-out; }
        button { background-color: #238636; color: white; border: none; padding: 14px 28px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; width: 100%; }
        button:hover { background-color: #2ea043; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <h1>RVP Protocol</h1>
        <div class="status">Infrastructure Inversion Dashboard</div>
        
        <div id="connection">
            <button onclick="connectWallet()">Connect MetaMask</button>
        </div>

        <div id="stats" style="display:none;">
            <div class="stat-box">
                <div class="label">Live Voting Power</div>
                <div id="votingPower" class="value">0</div>
            </div>
            
            <div class="stat-box">
                <div class="label">Physical Assets Progress</div>
                <div id="physicalInfra" class="value" style="color: #bc8cff;">0 RWA</div>
                <div class="progress-container">
                    <div id="bar" class="progress-bar"></div>
                </div>
            </div>

            <div class="stat-box" style="border-left: 4px solid #ff7b72;">
                <div class="label">Total Infra Air (Debt)</div>
                <div id="totalAir" class="value" style="color: #ff7b72;">0 RVT</div>
            </div>
        </div>
    </div>

    <script>
        // Η διεύθυνση του συμβολαίου σου
        const contractAddress = "0x42c56aaa94359307f4f5ed603c802cb1a0f67691";
        
        // Το ABI με τις σωστές συναρτήσεις
        const abi = [
            "function getVotingPower(address _user) view returns (uint256)",
            "function physicalInfrastructure() view returns (uint256)",
            "function totalInfraAir() view returns (uint256)"
        ];

        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = await provider.getSigner();
                    const userAddress = await signer.getAddress();
                    
                    document.getElementById("connection").innerHTML = `<p style='color: #3fb950'>● Connected: ${userAddress.substring(0,6)}...${userAddress.substring(38)}</p>`;
                    document.getElementById("stats").style.display = "block";
                    
                    updateStats(provider, userAddress);
                    setInterval(() => updateStats(provider, userAddress), 5000);
                } catch (error) {
                    console.error("Connection failed", error);
                }
            } else {
                alert("Please install MetaMask!");
            }
        }

        async function updateStats(provider, userAddress) {
            const contract = new ethers.Contract(contractAddress, abi, provider);
            try {
                const vp = await contract.getVotingPower(userAddress);
                const phys = await contract.physicalInfrastructure();
                const air = await contract.totalInfraAir();

                // Μετατροπή από Wei σε Ether για να φαίνονται σωστά τα νούμερα
                const physEth = parseFloat(ethers.formatEther(phys));
                const airEth = parseFloat(ethers.formatEther(air));

                document.getElementById("votingPower").innerText = vp.toString();
                document.getElementById("physicalInfra").innerText = physEth.toFixed(4) + " RWA Units";
                document.getElementById("totalAir").innerText = airEth.toFixed(4) + " RVT Air";

                // Ενημέρωση της μπάρας (υποθέτουμε στόχο το 1.0 για το παράδειγμα)
                const progress = Math.min((physEth / 1.0) * 100, 100); 
                document.getElementById("bar").style.width = (progress > 0 ? progress : 5) + "%";

            } catch (err) {
                console.error("Data fetch error:", err);
            }
        }
    </script>
</body>
</html>
