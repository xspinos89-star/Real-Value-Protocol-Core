<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Architect v13.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #05070a; --card: #0f172a; --primary: #10b981; --secondary: #3b82f6; --danger: #ef4444; --text: #f8fafc; --accent: #f59e0b; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard { width: 100%; max-width: 1100px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1e293b; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #1e293b; position: relative; }
        .label { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .value { font-size: 1.6rem; font-weight: 700; margin: 10px 0; font-family: 'Courier New', monospace; }
        .bar-container { width: 100%; background: #1e293b; height: 14px; border-radius: 7px; margin: 10px 0; overflow: hidden; }
        #efficiencyBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--danger), var(--primary)); transition: 1s; }
        .status-box { font-size: 0.9rem; font-weight: 700; padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.3); margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); text-align: center; color: var(--accent); }
        .btn-main { padding: 18px; border-radius: 12px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; width: 100%; margin-top: 10px; color: white; }
        .btn-deposit { background: var(--secondary); }
        .btn-harvest { background: var(--primary); }
        #connectBtn { padding: 12px 24px; background: var(--secondary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .impact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; text-align: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div>
            <h1 style="margin:0;">RVP Protocol <span style="color:var(--primary)">v13.5</span></h1>
            <div id="userWallet" style="font-size:0.75rem; color:var(--secondary); font-family:monospace; margin-top:5px;">ARCHITECT: DISCONNECTED</div>
        </div>
        <button id="connectBtn" onclick="connectWallet()">CONNECT ARCHITECT</button>
    </header>

    <div class="grid">
        <div class="card">
            <div class="label">Safe Capital (ETH)</div>
            <div id="safeCap" class="value">0.0000</div>
            <div style="font-size:0.7rem; color:var(--primary)">Verified On-Chain Balance</div>
        </div>
        <div class="card">
            <div class="label">Voting Power</div>
            <div id="vpVal" class="value">0.0000</div>
            <div id="loyaltyStatus" style="font-size:0.75rem; color:#888;">Protocol Weight</div>
        </div>
        <div class="card">
            <div class="label">Market Air (Debt)</div>
            <div id="airVal" class="value" style="color:var(--accent)">0.0000</div>
            <div id="satLabel" style="font-size:0.7rem; color:#888;">Saturation: 0.00%</div>
        </div>
        <div class="card">
            <div class="label">RWA Units</div>
            <div id="rwaVal" class="value" style="color:var(--primary)">0.0000</div>
            <div style="font-size:0.7rem;">Solidified Infrastructure</div>
        </div>
        <div class="card" style="grid-column: span 2;">
            <div class="label">Solidification Efficiency</div>
            <div class="bar-container"><div id="efficiencyBar"></div></div>
            <div id="statusMsg" class="status-box">AWAITING ARCHITECT AUTHENTICATION...</div>
        </div>
    </div>

    <div id="actions" style="display:none; margin-top: 30px;">
        <button class="btn-main btn-deposit" onclick="deposit()">Deposit Capital</button>
        <button class="btn-main btn-harvest" onclick="harvest()">Execute Solidification</button>
    </div>
</div>

<script>
    const ABI = [
        {"inputs":[],"name":"deposit","outputs":[],"stateMutability":"payable","type":"function"},
        {"inputs":[],"name":"airHarvest","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"address","name":"_user","type":"address"}],"name":"getVotingPower","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[{"internalType":"uint256","name":"deposit","type":"uint256"},{"internalType":"uint256","name":"physicalInfra","type":"uint256"},{"internalType":"uint256","name":"lastUpdate","type":"uint256"},{"internalType":"uint256","name":"accumulatedAir","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];
    const CONTRACT_ADDRESS = "0x99e09C98f0548Aba8803221157e653B82e345980";
    const ARCHITECT_ADDR = "0x42C56AAa94359307F4f5eD603c802Cb1a0F67691"; 

    let provider, signer, contract;

    // 1. Αυτόματο Read Data (MetaMask ανεξάρτητο)
    async function init() {
        if (window.ethereum) {
            provider = new ethers.BrowserProvider(window.ethereum);
            const readContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
            
            setInterval(async () => {
                try {
                    const userData = await readContract.users(ARCHITECT_ADDR);
                    const vpRaw = await readContract.getVotingPower(ARCHITECT_ADDR);
                    updateUI(userData, vpRaw);
                } catch (e) { console.log("Blockchain Syncing..."); }
            }, 1000);
        }
    }

    function updateUI(userData, vpRaw) {
        const dep = parseFloat(ethers.formatEther(userData.deposit));
        const rwa = parseFloat(ethers.formatEther(userData.physicalInfra));
        const acc = parseFloat(ethers.formatEther(userData.accumulatedAir));
        const last = Number(userData.lastUpdate);

        if (dep > 0 || rwa > 0) {
            const now = Math.floor(Date.now() / 1000);
            let liveAir = ((acc === 0 && rwa > 0) ? 0 : (dep * 0.10)) + 
                          (dep * 0.0425 * (now - last) / 31536000) + acc;

            document.getElementById('safeCap').innerText = dep.toFixed(4);
            document.getElementById('airVal').innerText = liveAir.toFixed(10);
            document.getElementById('rwaVal').innerText = rwa.toFixed(4);
            document.getElementById('vpVal').innerText = parseFloat(ethers.formatEther(vpRaw)).toFixed(6);
            
            let sat = (liveAir / (dep * 0.10)) * 100;
            let eff = sat > 100 ? Math.max(0, 100 - (sat - 100) * 10) : 100;
            document.getElementById('efficiencyBar').style.width = eff + "%";
            document.getElementById('satLabel').innerText = "Saturation: " + sat.toFixed(2) + "%";
            document.getElementById('statusMsg').innerText = "ARCHITECT DATA SYNCED";
        }
    }

    // 2. Σύνδεση για Transactions
    async function connectWallet() {
        if (window.ethereum) {
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                document.getElementById('connectBtn').style.display = "none";
                document.getElementById('actions').style.display = "block";
                document.getElementById('userWallet').innerText = "ACTIVE: " + accounts[0];
            } catch (e) { console.error(e); }
        }
    }

    // 3. Σταθερό Deposit (Force Signer)
    async function deposit() {
        try {
            const amount = prompt("ETH to deposit:");
            if (!amount || isNaN(amount)) return;

            // Επαναβεβαίωση Signer πριν την αποστολή
            if (!signer || !contract) {
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            }

            const tx = await contract.deposit({ value: ethers.parseEther(amount) });
            document.getElementById('statusMsg').innerText = "PENDING BLOCKCHAIN CONFIRMATION...";
            await tx.wait();
            location.reload();
        } catch (e) {
            console.error(e);
            alert("Transaction Fail: " + (e.reason || "Check MetaMask for details."));
        }
    }

    async function harvest() {
        try {
            if (!signer || !contract) {
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            }
            const tx = await contract.airHarvest();
            await tx.wait();
            location.reload();
        } catch (e) { alert("Harvest Fail"); }
    }

    init();
</script>
</body>
</html>
