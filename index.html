<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RVP Protocol Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 20px; display: inline-block; width: 350px; }
        button { background: #238636; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .stat { margin: 20px 0; text-align: left; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .val { color: #3fb950; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="box">
        <h1>RVP Protocol</h1>
        <div id="setup">
            <button onclick="connect()">Connect MetaMask</button>
        </div>
        <div id="dash" style="display:none">
            <div class="stat">Voting Power: <span id="vp" class="val">0</span></div>
            <div class="stat">Assets: <span id="ai" class="val">0</span> RWA</div>
            <button onclick="harvest()" style="background:#58a6ff">🚀 Air Harvest</button>
        </div>
    </div>

    <script>
        const addr = "0x30372f69466547690623631525a4773a9856a93d";
        const abi = [
            "function getVotingPower(address) view returns (uint256)",
            "function physicalInfrastructure() view returns (uint256)",
            "function airHarvest() public"
        ];
        let signer, contract;

        async function connect() {
            if (window.ethereum) {
                const provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                contract = new ethers.Contract(addr, abi, signer);
                document.getElementById('setup').style.display = 'none';
                document.getElementById('dash').style.display = 'block';
                update();
            }
        }

        async function update() {
            const user = await signer.getAddress();
            const vRaw = await contract.getVotingPower(user);
            const aRaw = await contract.physicalInfrastructure();
            document.getElementById('vp').innerText = parseFloat(ethers.formatUnits(vRaw, 18)).toFixed(2);
            document.getElementById('ai').innerText = parseFloat(ethers.formatUnits(aRaw, 18)).toFixed(4);
        }

        async function harvest() {
            const tx = await contract.airHarvest();
            await tx.wait();
            update();
        }
    </script>
</body>
</html>
