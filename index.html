<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Universal Sync v13.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #05070a; --card: #0f172a; --primary: #10b981; --secondary: #3b82f6; --danger: #ef4444; --text: #f8fafc; --accent: #f59e0b; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard { width: 100%; max-width: 1100px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1e293b; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #1e293b; }
        .label { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .value { font-size: 1.6rem; font-weight: 700; margin: 10px 0; font-family: 'Courier New', monospace; }
        .bar-container { width: 100%; background: #1e293b; height: 14px; border-radius: 7px; margin: 10px 0; overflow: hidden; }
        #efficiencyBar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--danger), var(--primary)); transition: 0.5s; }
        .status-box { font-size: 0.9rem; font-weight: 700; padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.3); margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn-main { padding: 18px; border-radius: 12px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; width: 100%; margin-top: 10px; }
        .btn-deposit { background: var(--secondary); color: white; }
        .btn-harvest { background: var(--primary); color: white; }
        #connectBtn { padding: 12px 24px; background: var(--secondary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div>
            <h1 style="margin:0;">RVP Protocol <span style="color:var(--primary)">v13.0</span></h1>
            <div id="userWallet" style="font-size:0.75rem; color:var(--secondary); font-family:monospace; margin-top:5px;">ARCHITECT SYNC: ON-CHAIN</div>
        </div>
        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <div class="grid">
        <div class="card">
            <div class="label">Safe Capital (ETH)</div>
            <div id="safeCap" class="value">0.0000</div>
            <div style="font-size:0.7rem; color:var(--primary)">Verified Balance</div>
        </div>
        <div class="card">
            <div class="label">Voting Power</div>
            <div id="vpVal" class="value">0.0000</div>
            <div id="loyaltyStatus" style="font-size:0.75rem;">Syncing Multiplier...</div>
        </div>
        <div class="card">
            <div class="label">Market Air (Debt)</div>
            <div id="airVal" class="value" style="color:var(--accent)">0.0000</div>
            <div id="saturationLabel" style="font-size:0.7rem; color:#888;">Saturation: 0.00%</div>
        </div>
        <div class="card">
            <div class="label">RWA Units</div>
            <div id="rwaVal" class="value" style="color:var(--primary)">0.0000</div>
            <div style="font-size:0.7rem;">Solidified Infrastructure</div>
        </div>
        <div class="card" style="grid-column: span 2;">
            <div class="label">Solidification Efficiency</div>
            <div class="bar-container"><div id="efficiencyBar"></div></div>
            <div id="statusMsg" class="status-box">INITIALIZING UNIVERSAL BRIDGE...</div>
        </div>
    </div>

    <div id="actions" style="display:none; margin-top: 20px;">
        <button class="btn-main btn-deposit" onclick="deposit()">Deposit Capital</button>
        <button class="btn-main btn-harvest" onclick="harvest()">Execute Solidification</button>
    </div>
</div>

<script>
    const ABI = [
        {"inputs":[],"name":"deposit","outputs":[],"stateMutability":"payable","type":"function"},
        {"inputs":[],"name":"airHarvest","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"address","name":"_user","type":"address"}],"name":"getVotingPower","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[{"internalType":"uint256","name":"deposit","type":"uint256"},{"internalType":"uint256","name":"physicalInfra","type":"uint256"},{"internalType":"uint256","name":"lastUpdate","type":"uint256"},{"internalType":"uint256","name":"accumulatedAir","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];
    const CONTRACT_ADDRESS = "0x99e09C98f0548Aba8803221157e653B82e345980";
    const ARCHITECT_ADDR = "0x42C56AAa94359307F4f5eD603c802Cb1a0F67691"; 

    // ΔΗΜΟΣΙΑ ΓΕΦΥΡΑ (Για να παίζει παντού χωρίς πορτοφόλι)
    const publicProvider = new ethers.JsonRpcProvider("https://rpc.ankr.com/eth");
    const readContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, publicProvider);

    let walletProvider, signer, writeContract;

    async function loadData() {
        try {
            const userData = await readContract.users(ARCHITECT_ADDR);
            const vpRaw = await readContract.getVotingPower(ARCHITECT_ADDR);

            const depositVal = parseFloat(ethers.formatEther(userData.deposit));
            const rwaVal = parseFloat(ethers.formatEther(userData.physicalInfra));
            const accAir = parseFloat(ethers.formatEther(userData.accumulatedAir));
            const lastUpdate = Number(userData.lastUpdate);

            if (depositVal > 0 || rwaVal > 0) {
                const now = Math.floor(Date.now() / 1000);
                const timePassed = now - lastUpdate;
                
                // Υπολογισμός Live Air (Μόνο ανοδικός)
                let fixedDebt = (accAir === 0 && rwaVal > 0) ? 0 : (depositVal * 0.10);
                let liveAir = fixedDebt + (depositVal * 0.0425 * timePassed / 31536000) + accAir;

                document.getElementById('safeCap').innerText = depositVal.toFixed(4);
                document.getElementById('airVal').innerText = liveAir.toFixed(10);
                document.getElementById('rwaVal').innerText = rwaVal.toFixed(4);
                document.getElementById('vpVal').innerText = parseFloat(ethers.formatEther(vpRaw)).toFixed(6);
                
                let saturation = (liveAir / (depositVal * 0.10)) * 100;
                let efficiency = saturation > 100 ? Math.max(0, 100 - (saturation - 100) * 10) : 100;
                document.getElementById('efficiencyBar').style.width = efficiency + "%";
                document.getElementById('saturationLabel').innerText = "Saturation: " + saturation.toFixed(2) + "%";
                document.getElementById('statusMsg').innerText = "ON-CHAIN SYNC: SUCCESSFUL";
            }
        } catch (e) {
            document.getElementById('statusMsg').innerText = "CONNECTING TO MAINNET...";
        }
    }

    async function connectWallet() {
        if (window.ethereum) {
            walletProvider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await walletProvider.send("eth_requestAccounts", []);
            signer = await walletProvider.getSigner();
            writeContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            document.getElementById('connectBtn').style.display = "none";
            document.getElementById('actions').style.display = "block";
            document.getElementById('userWallet').innerText = "ARCHITECT LOGGED IN: " + accounts[0];
        } else {
            window.location.href = "https://metamask.app.link/dapp/" + window.location.href.replace(/^https?:\/\//, '');
        }
    }

    async function deposit() {
        const val = prompt("ETH to Deposit:");
        if(val) {
            const tx = await writeContract.deposit({ value: ethers.parseEther(val) });
            await tx.wait();
            location.reload();
        }
    }

    async function harvest() {
        const tx = await writeContract.airHarvest();
        await tx.wait();
        location.reload();
    }

    setInterval(loadData, 1000);
    loadData();
</script>
</body>
</html>
