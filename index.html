<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | v10.2 Industrial Restoration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --panel: #05080a; --primary: #00f2ff; --secondary: #1a2a3a; --danger: #ff003c; --text: #e0e0e0; --border: #00f2ff; }
        
        body { 
            background: var(--bg); 
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; padding: 20px; 
        }

        .dashboard { 
            max-width: 1100px; margin: 0 auto; 
            border: 1px solid rgba(0, 242, 255, 0.2); 
            background: var(--panel); 
            padding: 30px;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
        }
        
        header { 
            border-bottom: 2px solid var(--border); 
            padding-bottom: 20px; margin-bottom: 40px; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 10px var(--primary); letter-spacing: 3px; margin: 0; }

        .main-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        
        .card { 
            border: 1px solid #1a2a3a; background: rgba(0,0,0,0.8); padding: 15px; 
            clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
        }

        .label { font-size: 0.65rem; color: #555; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
        .value { font-size: 1.2rem; font-weight: 700; color: #fff; font-family: 'Orbitron'; }

        .efficiency-zone { 
            margin: 30px 0; padding: 20px; border: 1px solid #1a2a3a; 
            background: linear-gradient(180deg, rgba(0,0,0,1) 0%, rgba(5,10,15,1) 100%);
        }

        .bar-bg { width: 100%; height: 8px; background: #111; border: 1px solid #222; margin-top: 15px; }
        #efficiencyBar { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 15px var(--primary); transition: 0.5s; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        
        .btn { 
            padding: 20px; font-family: 'Orbitron', sans-serif; font-weight: 700; 
            cursor: pointer; border: 1px solid var(--primary); transition: 0.3s; 
            background: transparent; color: var(--primary);
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
            text-transform: uppercase;
        }

        .btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 25px var(--primary); }

        .oracle-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 30px; border-top: 1px solid #1a2a3a; padding-top: 25px; }
        .ora-box { text-align: center; background: rgba(0,0,0,0.5); padding: 15px; border: 1px solid #1a2a3a; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div>
            <h1>RVP PROTOCOL <span style="font-size: 0.8rem; color: #fff; opacity: 0.5;">v10.2</span></h1>
            <div id="userWallet" style="font-size: 0.65rem; color: var(--primary); margin-top:5px;">SYSTEM_STATUS: DISCONNECTED</div>
        </div>
        <button onclick="connect()" id="connBtn" style="border: 1px solid var(--primary); background:none; color:var(--primary); padding:8px 15px; cursor:pointer; font-family:'Orbitron';">LINK_NODE</button>
    </header>

    <div class="main-grid">
        <div class="card">
            <div class="label">Safe Capital</div>
            <div id="safeCap" class="value">0.0000</div>
        </div>
        <div class="card">
            <div class="label">Sovereign Voting Power</div>
            <div id="vpVal" class="value">0.000000</div>
            <div id="tBonus" style="font-size:0.55rem; color:var(--primary); margin-top:5px;">BONUS: x1.0000</div>
        </div>
        <div class="card" style="border-color: var(--danger);">
            <div class="label">Captured Market Air</div>
            <div id="airVal" class="value" style="color:var(--danger);">0.00000000</div>
        </div>
        <div class="card">
            <div class="label">Infrastructure (RWA)</div>
            <div id="rwaVal" class="value">0.0000</div>
        </div>
    </div>

    <div class="efficiency-zone">
        <div style="display:flex; justify-content:space-between; font-size:0.7rem;">
            <span>SOLIDIFICATION_EFFICIENCY</span>
            <span id="effPct">100%</span>
        </div>
        <div class="bar-bg"><div id="efficiencyBar"></div></div>
    </div>

    <div class="btn-group">
        <button class="btn" onclick="deposit()">Deposit Capital</button>
        <button class="btn" onclick="harvest()">Solidify Air</button>
    </div>

    <div class="oracle-row">
        <div class="ora-box">
            <div class="label">Live Oracle Inflation</div>
            <div id="oraInf" style="font-size:1.1rem; color:var(--danger);">--%</div>
        </div>
        <div class="ora-box">
            <div class="label">Debt Shield Status</div>
            <div id="debtStatus" style="font-size:1.1rem; color:var(--primary);">STANDBY</div>
        </div>
        <div class="ora-box">
            <div class="label">Network Integrity</div>
            <div style="font-size:1.1rem; color:var(--primary);">SECURE</div>
        </div>
    </div>
</div>

<script>
    const CONTRACT_ADDRESS = "0x99e09C98f0548Aba8803221157e653B82e345980";
    const ABI = [
        {"inputs":[],"name":"deposit","outputs":[],"stateMutability":"payable","type":"function"},
        {"inputs":[],"name":"airHarvest","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"address","name":"_user","type":"address"}],"name":"getVotingPower","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"users","outputs":[{"internalType":"uint256","name":"deposit","type":"uint256"},{"internalType":"uint256","name":"physicalInfra","type":"uint256"},{"internalType":"uint256","name":"lastUpdate","type":"uint256"},{"internalType":"uint256","name":"accumulatedAir","type":"uint256"}],"stateMutability":"view","type":"function"}
    ];

    let provider, signer, contract, userAddr;
    let liveInf = 0.0381;

    async function getLiveOracle() {
        try {
            const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd&include_24hr_change=true');
            const d = await r.json();
            liveInf = 0.03 + (Math.abs(d.ethereum.usd_24h_change) / 100);
            document.getElementById('oraInf').innerText = (liveInf * 100).toFixed(2) + "%";
        } catch(e) { console.log("Oracle Link Error"); }
    }
    setInterval(getLiveOracle, 20000); getLiveOracle();

    async function connect() {
        if (!window.ethereum) return;
        provider = new ethers.BrowserProvider(window.ethereum);
        const accs = await provider.send("eth_requestAccounts", []);
        userAddr = accs[0];
        signer = await provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        document.getElementById('userWallet').innerText = "ARCHITECT_ID: " + userAddr;
        document.getElementById('connBtn').style.display = "none";
        loop();
    }

    async function loop() {
        if (!contract) return;
        try {
            const u = await contract.users(userAddr);
            const vp = await contract.getVotingPower(userAddr);
            
            const d = parseFloat(ethers.formatEther(u.deposit));
            const r = parseFloat(ethers.formatEther(u.physicalInfra));
            const a = parseFloat(ethers.formatEther(u.accumulatedAir));
            const last = Number(u.lastUpdate);
            const now = Math.floor(Date.now() / 1000);
            const dt = now - last;

            // v10.2 Logic: Persistence & Velocity
            let timeBonus = 1 + (dt * 0.0000009);
            let resistance = 1 / (1 + (r * 2.5));
            let envAir = (0.00022 * liveInf * dt * 100) / 31536000;
            let totalAir = a + (envAir * resistance);

            // UI Map
            document.getElementById('safeCap').innerText = d.toFixed(4);
            document.getElementById('airVal').innerText = totalAir.toFixed(10);
            document.getElementById('rwaVal').innerText = r.toFixed(4);
            document.getElementById('vpVal').innerText = (parseFloat(ethers.formatEther(vp)) * timeBonus).toFixed(6);
            document.getElementById('tBonus').innerText = "BONUS: x" + timeBonus.toFixed(8);
            
            let threshold = d > 0 ? d * 0.1 : 0.01;
            let sat = (totalAir / threshold) * 100;
            let eff = Math.max(0, 100 - (sat > 100 ? (sat - 100) : 0));
            document.getElementById('efficiencyBar').style.width = Math.min(sat, 100) + "%";
            document.getElementById('effPct').innerText = Math.round(eff) + "%";
            document.getElementById('debtStatus').innerText = a > 0.00001 ? "SOLIDIFYING" : "PROTECTED";

        } catch(e) {}
        setTimeout(loop, 1000);
    }

    async function deposit() {
        const amt = prompt("ETH Deposit Amount:");
        if(!amt) return;
        try {
            const tx = await contract.deposit({ value: ethers.parseEther(amt) });
            await tx.wait();
        } catch(e) { alert("Transaction Aborted"); }
    }

    async function harvest() {
        try {
            const s = await provider.getSigner(); 
            const c = new ethers.Contract(CONTRACT_ADDRESS, ABI, s);
            const tx = await c.airHarvest();
            await tx.wait();
        } catch(e) { alert("Solidification failed."); }
    }
</script>
</body>
</html>
