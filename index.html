<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>RVP Protocol v2.7 - FINAL STABLE</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 40px; }
        .box { border: 1px solid #30363d; background: #161b22; padding: 40px; display: inline-block; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); max-width: 500px; width: 90%; }
        h1 { color: #58a6ff; margin-bottom: 10px; }
        .btn { background: #238636; color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; border-radius: 6px; transition: 0.2s; margin-top: 20px; width: 100%; }
        .btn:hover { background: #2ea043; }
        .btn-connect { background: #1f6feb; }
        .btn-connect:hover { background: #388bfd; }
        #data { display: none; margin-top: 30px; text-align: left; }
        .stat { background: #0d1117; padding: 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #30363d; display: flex; justify-content: space-between; }
        .label { color: #8b949e; }
        .value { color: #58a6ff; font-weight: bold; }
        #status { color: #8b949e; margin-bottom: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="box">
    <h1>RVP TERMINAL v2.7</h1>
    <p style="color: #8b949e; margin-top: 0;">New Contract Deployed</p>
    <div id="status">Ready to connect...</div>
    
    <button id="connectBtn" class="btn btn-connect" onclick="forceConnect()">🦊 CONNECT METAMASK</button>

    <div id="data">
        <div class="stat">
            <span class="label">My Deposit:</span>
            <span id="dep" class="value">0</span> <span class="value">ETH</span>
        </div>
        <div class="stat">
            <span class="label">Voting Power:</span>
            <span id="vp" class="value">0</span> <span class="value">VP</span>
        </div>
        <div class="stat">
            <span class="label">Current AIR:</span>
            <span id="air" class="value">0</span> <span class="value">AIR</span>
        </div>
        
        <button class="btn" onclick="doDeposit()">DEPOSIT 0.1 ETH</button>
        <button class="btn" style="background: #8957e5;" onclick="doHarvest()">HARVEST AIR</button>
    </div>
</div>

<script>
    // ΝΕΑ ΔΙΕΥΘΥΝΣΗ ΣΥΜΒΟΛΑΙΟΥ
    const addr = "0x99e09C98f0548Aba8803221157e653B82e345980"; 
    
    const abi = [
        "function deposit() public payable",
        "function airHarvest() public",
        "function getVotingPower(address _user) public view returns (uint256)",
        "function users(address) public view returns (uint256 deposit, uint256 physicalInfra, uint256 lastUpdate, uint256 accumulatedAir)",
        "function totalInfraAir(address _user) public view returns (uint256)"
    ];

    let provider, signer, contract;

    async function forceConnect() {
        if (!window.ethereum) return alert("MetaMask is not installed!");
        
        try {
            document.getElementById('status').innerText = "Requesting permission...";
            
            // Force account selection window
            await window.ethereum.request({ 
                method: 'wallet_requestPermissions', 
                params: [{ eth_accounts: {} }] 
            });
            
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            contract = new ethers.Contract(addr, abi, signer);
            
            const user = await signer.getAddress();
            document.getElementById('status').innerText = "Connected: " + user.substring(0,6) + "..." + user.substring(38);
            document.getElementById('connectBtn').style.display = "none";
            document.getElementById('data').style.display = "block";
            
            update();
            setInterval(update, 5000); // Auto update every 5 seconds
        } catch (err) {
            document.getElementById('status').innerText = "Connection failed.";
            console.error(err);
        }
    }
