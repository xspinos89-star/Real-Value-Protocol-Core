<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVP Protocol | Arbitrum L2 Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #28a745; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #2196f3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 600px; margin-top: 50px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .header { text-align: center; margin-bottom: 30px; }
        .badge { background: var(--accent); color: white; padding: 5px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--primary); display: block; }
        .stat-label { font-size: 0.9rem; color: #94a3b8; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: all 0.3s; margin-bottom: 10px; }
        .btn-deposit { background: var(--primary); color: white; }
        .btn-deposit:hover { background: #218838; transform: translateY(-2px); }
        .btn-harvest { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-harvest:hover { background: var(--primary); color: white; }
        .footer { margin-top: 20px; text-align: center; font-size: 0.85rem; color: #64748b; }
        a { color: var(--accent); text-decoration: none; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="badge">Arbitrum One L2</span>
        <h1>Air Capture RVP</h1>
        <p id="wallet-address">Συνδέστε το MetaMask</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <span class="stat-label">Συνολικό Air</span>
            <span id="total-air" class="stat-value">0.00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Το Υπόλοιπό σου</span>
            <span id="user-eth" class="stat-value">0.00</span>
        </div>
    </div>

    <div class="input-group">
        <input type="number" id="depositAmount" placeholder="Ποσό σε ETH (π.χ. 0.01)" step="0.01">
    </div>

    <button class="btn-deposit" onclick="deposit()">Κατάθεση (Deposit)</button>
    <button class="btn-harvest" onclick="harvest()">Εξαργύρωση (Harvest)</button>

    <div id="status"></div>

    <div class="footer">
        Contract: <a id="contract-link" href="#" target="_blank">Προβολή στο Arbiscan</a>
    </div>
</div>

<script>
    // ΣΤΟΙΧΕΙΑ ΣΥΜΒΟΛΑΙΟΥ
    const CONTRACT_ADDRESS = "0x261174abFb883877498A9234059FfC723E920127";
    const ABI = [
        "function deposit() public payable",
        "function harvest() public",
        "function getAirBalance(address user) public view returns (uint256)",
        "function getTotalAir() public view returns (uint256)"
    ];

    let provider, signer, contract;

    async function init() {
        if (window.ethereum) {
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                const addr = await signer.getAddress();
                document.getElementById('wallet-address').innerText = "Wallet: " + addr.substring(0,6) + "..." + addr.substring(38);
                document.getElementById('contract-link').href = `https://sepolia.arbiscan.io/address/${CONTRACT_ADDRESS}`;
                
                // Real-time Updates
                updateStats();
                setInterval(updateStats, 2000); // Κάθε 2 δευτερόλεπτα λόγω Arbitrum Speed
            } catch (err) {
                console.error(err);
                showStatus("Σφάλμα σύνδεσης wallet", "red");
            }
        } else {
            showStatus("Παρακαλώ εγκαταστήστε το MetaMask", "orange");
        }
    }

    async function updateStats() {
        try {
            const totalAirRaw = await contract.getTotalAir();
            const userAirRaw = await contract.getAirBalance(await signer.getAddress());
            
            // Μετατροπή από Wei σε ETH
            document.getElementById('total-air').innerText = parseFloat(ethers.formatEther(totalAirRaw)).toFixed(4);
            document.getElementById('user-eth').innerText = parseFloat(ethers.formatEther(userAirRaw)).toFixed(4);
        } catch (err) {
            console.error("Update error:", err);
        }
    }

    async function deposit() {
        const amount = document.getElementById('depositAmount').value;
        if (!amount || amount <= 0) return showStatus("Βάλτε έγκυρο ποσό", "orange");

        try {
            showStatus("Η συναλλαγή επεξεργάζεται στο Arbitrum...", "cyan");
            const tx = await contract.deposit({ value: ethers.parseEther(amount) });
            await tx.wait();
            showStatus("Επιτυχής Κατάθεση! 🚀", "var(--primary)");
            updateStats();
        } catch (err) {
            showStatus("Η συναλλαγή ακυρώθηκε", "red");
        }
    }

    async function harvest() {
        try {
            showStatus("Harvesting Air... παρακαλώ περιμένετε", "cyan");
            const tx = await contract.harvest();
            await tx.wait();
            showStatus("Harvest Ολοκληρώθηκε! ✅", "var(--primary)");
            updateStats();
        } catch (err) {
            showStatus("Σφάλμα στο Harvest", "red");
        }
    }

    function showStatus(msg, color) {
        const s = document.getElementById('status');
        s.innerText = msg;
        s.style.color = color;
    }

    window.onload = init;
</script>

</body>
</html>
